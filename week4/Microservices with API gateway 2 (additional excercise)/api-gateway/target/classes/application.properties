server.port=9090

spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true


spring.cloud.gateway.server.webflux.routes[0].id=account-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/account-service/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[1].id=loan-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://LOAN-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/loan-service/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1